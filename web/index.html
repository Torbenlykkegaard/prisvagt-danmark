<!DOCTYPE html>
<html lang="da">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="PrisVagt Danmark - spar penge hver dag med prisvagter og tilbud.">
  <meta name="theme-color" content="#0B2D4D">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="PrisVagt">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="manifest" href="manifest.json">
  <title>PrisVagt Danmark</title>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('flutter_service_worker.js');
      });
    }

    let deferredInstallPrompt = null;
    window.addEventListener('beforeinstallprompt', function(event) {
      event.preventDefault();
      deferredInstallPrompt = event;
      window.dispatchEvent(new Event('prisvagt-install-ready'));
    });
    window.prisvagtInstall = async function() {
      if (!deferredInstallPrompt) return false;
      deferredInstallPrompt.prompt();
      const choice = await deferredInstallPrompt.userChoice;
      deferredInstallPrompt = null;
      return choice.outcome === 'accepted';
    };
  </script>
</body>
</html>
